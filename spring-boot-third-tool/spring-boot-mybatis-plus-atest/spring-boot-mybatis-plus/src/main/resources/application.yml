server:
  servlet:
    context-path: /
  port: 8080

spring:
  datasource:
    username: root
    password: 123456
    url: jdbc:mysql://localhost:3306/spring_boot_mybatis_plus?useSSL=false&useUnicode=true&characterEncoding=UTF-8&zeroDateTimeBehavior=convertToNull&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  # 注意： classpath*：不仅在本地项目resources中查找,还包括jar包中的， classpath则只包含本地的
  mapper-locations:
    #  默认 classpath*:/mapper/**/*.xml
    - classpath*:mapper/**/*Mapper.xml
  configuration:
    # 下划线驼峰命名 默认 true
    map-underscore-to-camel-case: true
    # 开启日志打印
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl


pagehelper:
  helper-dialect: mysql     # 支持Oracle,Mysql,MariaDB,SQLite,Hsqldb,PostgreSQL等等
  reasonable: true              # 分页合理化参数，默认值为false, true会合理化( pageNum<=0 和 pageNum>pages)
  support-methods-arguments: true
  params: count=countSql
  auto-runtime-dialect: true    # 动态数据源 autoRuntimeDialect:true，确保使用不同数据源时，会使用匹配的分页进行查询
  close-conn: false             # 默认true:每次获取数据源后自动关闭, 这里设置成false, 不关闭